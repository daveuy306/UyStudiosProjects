<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UY Studios | Production Engine</title>
    
    <!-- Tailwind CSS Support -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
      /* Global base styles to match your App.jsx theme */
      body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background-color: #050810;
        color: #cbd5e1;
      }

      /* Custom scrollbar for the dark theme */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #050810;
      }
      ::-webkit-scrollbar-thumb {
        background: #1e293b;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #334155;
      }

      /* Animation for mobile menu */
      @keyframes slideInRight {
        from { transform: translateX(100%); }
        to { transform: translateX(0); }
      }
      .slide-in-right {
        animation: slideInRight 0.3s ease-out forwards;
      }
    </style>
  </head>
  <body>
    <!-- React will inject the entire application into this div -->
    <div id="root"></div>

    <!-- 
      VITE USERS: Point to your main.jsx 
      CRA USERS: This script tag is usually added automatically during build
    -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
